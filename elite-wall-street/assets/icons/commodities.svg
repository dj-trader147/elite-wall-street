<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="commodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="32" cy="32" r="30" fill="url(#commodGrad)" opacity="0.2"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#commodGrad)" stroke-width="2"/>
  
  <!-- Gold Bar Icon -->
  <g transform="translate(32, 32)">
    <!-- Main Bar -->
    <rect x="-12" y="-8" width="24" height="16" fill="#ffd700" stroke="#d4af37" stroke-width="1.5" rx="1"/>
    
    <!-- Shine Effect -->
    <rect x="-10" y="-6" width="4" height="12" fill="#fff" opacity="0.3" rx="0.5"/>
    
    <!-- Text -->
    <text x="0" y="2" 
          font-family="'Inter', sans-serif" 
          font-size="8" 
          font-weight="700" 
          fill="#8b7500"
          text-anchor="middle">
      GOLD
    </text>
    
    <!-- Weight -->
    <text x="0" y="-12" 
          font-family="'Inter', sans-serif" 
          font-size="6" 
          font-weight="400" 
          fill="#d4af37"
          text-anchor="middle">
      999.9
    </text>
    
    <!-- Oil Barrel (Small) -->
    <g transform="translate(0, 14)">
      <ellipse cx="0" cy="0" rx="8" ry="3" fill="#2c3e50"/>
      <rect x="-8" y="0" width="16" height="8" fill="#34495e"/>
      <ellipse cx="0" cy="8" rx="8" ry="3" fill="#1a252f"/>
      <circle cx="0" cy="4" r="2" fill="#7f8c8d"/>
    </g>
  </g>
</svg>