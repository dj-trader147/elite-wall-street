<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="forexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="32" cy="32" r="30" fill="url(#forexGrad)" opacity="0.2"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#forexGrad)" stroke-width="2"/>
  
  <!-- Currency Symbols -->
  <g transform="translate(32, 32)">
    <!-- Dollar $ -->
    <text x="-18" y="-8" 
          font-family="'Inter', sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#667eea">
      $
    </text>
    
    <!-- Euro € -->
    <text x="8" y="-8" 
          font-family="'Inter', sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#764ba2">
      €
    </text>
    
    <!-- Pound £ -->
    <text x="-18" y="16" 
          font-family="'Inter', sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#9f7aea">
      £
    </text>
    
    <!-- Yen ¥ -->
    <text x="8" y="16" 
          font-family="'Inter', sans-serif" 
          font-size="20" 
          font-weight="700" 
          fill="#667eea">
      ¥
    </text>
    
    <!-- Exchange Arrows -->
    <path d="M-5,-2 L5,-2" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <path d="M3,-4 L5,-2 L3,0" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <path d="M5,5 L-5,5" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <path d="M-3,3 L-5,5 L-3,7" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
</svg>