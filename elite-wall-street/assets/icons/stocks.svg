<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stocksGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="32" cy="32" r="30" fill="url(#stocksGrad)" opacity="0.2"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#stocksGrad)" stroke-width="2"/>
  
  <!-- Chart Bars -->
  <g transform="translate(16, 16)">
    <!-- Bar 1 -->
    <rect x="0" y="16" width="6" height="16" fill="#00ff88" rx="1"/>
    
    <!-- Bar 2 -->
    <rect x="9" y="8" width="6" height="24" fill="#00ff88" rx="1"/>
    
    <!-- Bar 3 -->
    <rect x="18" y="12" width="6" height="20" fill="#00ff88" rx="1"/>
    
    <!-- Bar 4 -->
    <rect x="27" y="4" width="6" height="28" fill="#00ff88" rx="1"/>
    
    <!-- Trend Line -->
    <path d="M3,24 L12,14 L21,18 L30,8" 
          stroke="#fff" 
          stroke-width="2" 
          fill="none"
          opacity="0.8"/>
    
    <!-- Arrow Up -->
    <path d="M30,8 L28,12 L32,12 Z" fill="#fff" opacity="0.8"/>
  </g>
</svg>