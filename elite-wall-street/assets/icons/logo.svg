<svg width="200" height="50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon - Bull -->
  <g transform="translate(5, 5)">
    <!-- Body -->
    <ellipse cx="20" cy="25" rx="15" ry="10" fill="url(#logoGrad)"/>
    
    <!-- Head -->
    <circle cx="12" cy="18" r="8" fill="url(#logoGrad)"/>
    
    <!-- Horns -->
    <path d="M8,12 Q6,8 8,6" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
    <path d="M16,12 Q18,8 16,6" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
    
    <!-- Legs -->
    <line x1="12" y1="33" x2="12" y2="38" stroke="url(#logoGrad)" stroke-width="2"/>
    <line x1="28" y1="33" x2="28" y2="38" stroke="url(#logoGrad)" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="50" y="25" 
        font-family="'Orbitron', sans-serif" 
        font-size="18" 
        font-weight="700" 
        fill="url(#logoGrad)">
    ELITE
  </text>
  
  <text x="50" y="38" 
        font-family="'Orbitron', sans-serif" 
        font-size="10" 
        font-weight="400" 
        fill="#888"
        letter-spacing="2">
    WALL STREET
  </text>
  
  <!-- Chart Line Accent -->
  <path d="M130,35 L145,25 L160,30 L175,20 L190,28" 
        stroke="url(#logoGrad)" 
        stroke-width="2" 
        fill="none"
        opacity="0.6"/>
</svg>